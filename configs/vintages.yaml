# Vintage policy: all spatial data must be mapped to 2020 Census geography.
# Non-2020 sources require crosswalk apportionment before spine merge.

canonical_vintage: 2020

tiger:
  year: 2020
  base_url: "https://www2.census.gov/geo/tiger/TIGER2020"
  cartographic_url: "https://www2.census.gov/geo/tiger/GENZ2020/shp"

pl_redistricting:
  year: 2020
  base_url: "https://www2.census.gov/programs-surveys/decennial/2020/data/01-Redistricting_File--PL_94-171"

lodes:
  version: "LODES8"
  default_year: 2021
  vintage_note: >
    LODES8 uses 2020 Census blocks. Earlier LODES versions use 2010 blocks
    and require crosswalk apportionment.

acs:
  dataset: "acs5"
  default_year: 2023
  vintage_note: >
    ACS 5yr 2023 uses 2020 Census geography natively. No crosswalk needed.

crosswalks:
  nhgis_2010_to_2020:
    source: "NHGIS"
    method: "areal_interpolation"
    note: "Required for any 2010-vintage block group data"
